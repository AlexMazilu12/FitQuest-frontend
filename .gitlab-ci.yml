image: cypress/base:14.17.0

variables:
  GIT_DEPTH: "0"

stages:
  - build
  - test

build:
  stage: build
  script:
    - npm install
    - npm run build

cypress-test:
  stage: test
  script:
    - npm install
    - npm run dev
    - npx wait-on http://localhost:5173
    - npx cypress run
  dependencies:
    - build