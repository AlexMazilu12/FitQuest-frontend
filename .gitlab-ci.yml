image: cypress/browsers:22.12.0

stages:
  - build

build:
  stage: build
  tags: ["windowsversion:1809"]
  hooks:
    pre_get_sources_script:
      - git config --system core.longpaths true
  script:
    - if (Test-Path -Path $CI_PROJECT_DIR/cache/Cypress) { Remove-Item -Recurse -Force $CI_PROJECT_DIR/cache/Cypress }